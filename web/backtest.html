<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Backtest — Strategy Replay</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --line:#21262d; --text:#c9d1d9; --muted:#8b949e;
    --up:#26a269; --down:#e5484d; --accent:#58a6ff; --amber:#d29922;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px; }
  .app { max-width:1120px; margin:0 auto; padding:16px; }
  header { display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; border-bottom:1px solid var(--line); padding-bottom:10px; }
  h1 { font-size:15px; margin:0; font-weight:600; }
  h1 .sub { color:var(--muted); font-weight:400; }
  .cards { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 12px; min-width:110px; }
  .card .k { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
  .card .v { font-size:19px; font-variant-numeric:tabular-nums; margin-top:2px; }
  .up { color:var(--up); } .down { color:var(--down); }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; margin-bottom:12px; }
  .panel h2 { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:0; padding:8px 12px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; }
  .panel h2 .live { color:var(--text); }
  canvas { display:block; width:100%; }
  .wrap { padding:8px; }
  .controls { display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--panel); border:1px solid var(--line); border-radius:8px; }
  button { background:#21262d; color:var(--text); border:1px solid #30363d; border-radius:6px; padding:6px 10px; font-family:var(--mono); font-size:13px; cursor:pointer; }
  button:hover { background:#2d333b; }
  .speeds button.on { background:var(--accent); color:#05121f; border-color:var(--accent); }
  input[type=range] { flex:1; accent-color:var(--accent); }
  .frame { color:var(--muted); font-variant-numeric:tabular-nums; min-width:120px; text-align:right; }
  .hint { color:var(--muted); font-size:11px; margin-top:8px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Backtest <span class="sub">· <span id="strategy">—</span></span></h1>
  </header>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <h2>Price &amp; Trades <span class="live" id="price-live"></span></h2>
    <div class="wrap"><canvas id="price" height="300" style="height:300px"></canvas></div>
  </div>

  <div class="panel">
    <h2>Equity Curve <span class="live" id="equity-live"></span></h2>
    <div class="wrap"><canvas id="equity" height="180" style="height:180px"></canvas></div>
  </div>

  <div class="controls">
    <button id="back" title="Step back">⏮</button>
    <button id="play" style="min-width:44px">▶</button>
    <button id="fwd" title="Step forward">⏭</button>
    <span class="speeds" id="speeds">
      <button data-s="1">1×</button>
      <button data-s="2" class="on">2×</button>
      <button data-s="4">4×</button>
      <button data-s="8">8×</button>
    </span>
    <input type="range" id="scrub" min="0" max="0" value="0" />
    <span class="frame" id="frame">bar 0 / 0</span>
  </div>
  <div class="hint">A moving-average-cross strategy replayed bar by bar. ▲ = buy, ▼ = sell. Data: <code>backtest.json</code> (generated by the C++ engine).</div>
</div>

<script>
(function () {
  "use strict";
  const $ = (id) => document.getElementById(id);
  let D = null, N = 0, i = 0, playing = false, timer = null, speed = 2;
  const BASE_FPS = 30;
  let tMin, tMax, pMin, pMax, eMin, eMax;

  const fmtMoney = (v) => "$" + v.toLocaleString(undefined, { maximumFractionDigits: 0 });
  const fmtPct = (f) => (f * 100).toFixed(1) + "%";

  function cards(m) {
    const items = [
      ["Total Return", fmtPct(m.total_return), m.total_return >= 0 ? "up" : "down"],
      ["Sharpe", m.sharpe.toFixed(2), ""],
      ["Sortino", m.sortino.toFixed(2), ""],
      ["Max Drawdown", fmtPct(m.max_drawdown), "down"],
      ["Win Rate", fmtPct(m.win_rate), ""],
      ["Trades", String(m.num_trades), ""],
      ["Profit Factor", m.profit_factor < 0 ? "∞" : m.profit_factor.toFixed(2), ""],
    ];
    $("cards").innerHTML = items.map(([k, v, c]) =>
      `<div class="card"><div class="k">${k}</div><div class="v ${c}">${v}</div></div>`).join("");
  }

  function fit(cv) {
    const dpr = window.devicePixelRatio || 1, w = cv.clientWidth, h = cv.clientHeight;
    if (cv.width !== w * dpr || cv.height !== h * dpr) { cv.width = w * dpr; cv.height = h * dpr; }
    const ctx = cv.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx, w, h };
  }

  const PAD = { l: 8, r: 56, t: 10, b: 18 };
  const xAt = (t, w) => PAD.l + (t - tMin) / ((tMax - tMin) || 1) * (w - PAD.l - PAD.r);
  const yAt = (v, lo, hi, h) => (h - PAD.b) - (v - lo) / ((hi - lo) || 1) * (h - PAD.t - PAD.b);

  function yAxis(ctx, w, h, lo, hi, fmt) {
    ctx.fillStyle = "#6e7681"; ctx.font = "10px " + getComputedStyle(document.body).fontFamily;
    ctx.textAlign = "left";
    for (let k = 0; k <= 4; k++) {
      const v = lo + (hi - lo) * k / 4, y = yAt(v, lo, hi, h);
      ctx.strokeStyle = "#1b2027"; ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(w - PAD.r, y); ctx.stroke();
      ctx.fillText(fmt(v), w - PAD.r + 4, y + 3);
    }
  }

  function drawPrice() {
    const { ctx, w, h } = fit($("price"));
    ctx.clearRect(0, 0, w, h);
    yAxis(ctx, w, h, pMin, pMax, (v) => v.toFixed(0));
    const bars = D.bars, upto = bars[i][0];

    ctx.beginPath();
    for (let k = 0; k <= i; k++) {
      const x = xAt(bars[k][0], w), y = yAt(bars[k][1], pMin, pMax, h);
      k ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.strokeStyle = "#8b949e"; ctx.lineWidth = 1.3; ctx.stroke();

    for (const f of D.fills) {
      if (f[0] > upto) break;
      const x = xAt(f[0], w), y = yAt(f[2], pMin, pMax, h), buy = f[1] === "B";
      ctx.fillStyle = buy ? "#26a269" : "#e5484d";
      ctx.beginPath();
      if (buy) { ctx.moveTo(x, y + 8); ctx.lineTo(x - 5, y + 16); ctx.lineTo(x + 5, y + 16); }
      else { ctx.moveTo(x, y - 8); ctx.lineTo(x - 5, y - 16); ctx.lineTo(x + 5, y - 16); }
      ctx.closePath(); ctx.fill();
    }
    $("price-live").textContent = bars[i][1].toFixed(2);
  }

  function drawEquity() {
    const { ctx, w, h } = fit($("equity"));
    ctx.clearRect(0, 0, w, h);
    yAxis(ctx, w, h, eMin, eMax, (v) => "$" + (v / 1000).toFixed(0) + "k");
    const eq = D.equity;
    const base = D.meta.initial_cash, up = eq[i][1] >= base;

    // baseline (initial capital)
    const yB = yAt(base, eMin, eMax, h);
    ctx.strokeStyle = "#30363d"; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(PAD.l, yB); ctx.lineTo(w - PAD.r, yB); ctx.stroke(); ctx.setLineDash([]);

    ctx.beginPath();
    for (let k = 0; k <= i; k++) {
      const x = xAt(eq[k][0], w), y = yAt(eq[k][1], eMin, eMax, h);
      k ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.strokeStyle = up ? "#26a269" : "#e5484d"; ctx.lineWidth = 1.5; ctx.stroke();
    $("equity-live").textContent = fmtMoney(eq[i][1]);
  }

  function render() {
    drawPrice(); drawEquity();
    $("scrub").value = i;
    $("frame").textContent = `bar ${i} / ${N - 1}`;
  }
  function goto(n) { i = Math.max(0, Math.min(N - 1, n)); render(); }

  function step() { if (i >= N - 1) { stop(); return; } goto(i + 1); }
  function start() { playing = true; $("play").textContent = "❚❚"; timer = setInterval(step, 1000 / (BASE_FPS * speed)); }
  function stop() { playing = false; $("play").textContent = "▶"; if (timer) { clearInterval(timer); timer = null; } }

  $("play").onclick = () => (playing ? stop() : (i >= N - 1 && goto(0), start()));
  $("back").onclick = () => { stop(); goto(i - 1); };
  $("fwd").onclick = () => { stop(); goto(i + 1); };
  $("scrub").oninput = (e) => { stop(); goto(+e.target.value); };
  [...$("speeds").children].forEach((b) => (b.onclick = () => {
    speed = +b.dataset.s;
    [...$("speeds").children].forEach((x) => x.classList.toggle("on", +x.dataset.s === speed));
    if (playing) { stop(); start(); }
  }));
  window.addEventListener("resize", render);

  fetch("backtest.json").then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then((d) => {
      D = d; N = d.bars.length;
      $("strategy").textContent = d.meta.strategy;
      cards(d.metrics);
      tMin = d.bars[0][0]; tMax = d.bars[N - 1][0];
      pMin = Math.min(...d.bars.map((b) => b[1])); pMax = Math.max(...d.bars.map((b) => b[1]));
      eMin = Math.min(d.meta.initial_cash, ...d.equity.map((e) => e[1]));
      eMax = Math.max(d.meta.initial_cash, ...d.equity.map((e) => e[1]));
      const padE = (eMax - eMin) * 0.08 || 1; eMin -= padE; eMax += padE;
      const padP = (pMax - pMin) * 0.08 || 1; pMin -= padP; pMax += padP;
      $("scrub").max = N - 1;
      render();
      start();
    })
    .catch((err) => { $("strategy").textContent = "load error: " + err.message + " (serve over HTTP)"; });
})();
</script>
</body>
</html>
